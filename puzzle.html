<script>

function checkAnswers(){

    let correct = true;

    let answers = [
        "58391",
        "74126",
        "90457",
        "31864",
        "67295"
    ];


    for(let i = 1; i <= 5; i++){

        let input = document.getElementById("answer" + i).value.trim();

        let tick = document.getElementById("tick" + i);


        if(input === answers[i-1]){

            tick.innerHTML = "✅";
            tick.className = "correct";

        }

        else{

            tick.innerHTML = "❌";
            tick.style.color = "red";

            correct = false;

        }

    }


    if(correct){

        document.getElementById("stage2").classList.remove("hidden");

    }

}

</script>
